<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arshia Karkhanehie | Python & AI Engineer</title>

    <script src="https://cdn.jsdelivr.net/npm/lucide@latest/dist/umd/lucide.min.js"></script>

    <style>
        :root {
            --bg-main: #0B0F19;
            --bg-card: #131A26;
            --accent: #38BDF8;
            --accent-muted: #1E293B;
            --text-main: #F8FAFC;
            --text-muted: #94A3B8;
            --border: #1E293B;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI",
                Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 1.5rem;
            overflow-x: hidden;

            background:
                radial-gradient(
                    circle at top right,
                    rgba(56, 189, 248, 0.18),
                    transparent 35%
                ),
                radial-gradient(
                    circle at bottom left,
                    rgba(56, 189, 248, 0.10),
                    transparent 30%
                ),
                #0B0F19;
        }

        .card {
            background: rgba(19, 26, 38, 0.65);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 2.5rem;
            width: 100%;
            max-width: 520px;

            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);

            box-shadow:
                0 25px 50px rgba(0,0,0,.5),
                0 0 40px rgba(56,189,248,.08);

            text-align: center;
            transition: all .3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
            border-color: rgba(56, 189, 248, .35);
        }

        .avatar-container {
            position: relative;
            width: 120px;
            height: 120px;
            margin: 0 auto 1.5rem;
        }

        .avatar {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            overflow: hidden;

            border: 2px solid rgba(56, 189, 248, .25);
            background: linear-gradient(
                135deg,
                #1E293B,
                #38BDF8
            );
        }

        .avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .status-badge {
            position: absolute;
            bottom: 0;
            right: 0;

            background: #059669;
            color: white;

            font-size: .75rem;
            font-weight: 600;

            padding: .25rem .6rem;
            border-radius: 999px;

            display: flex;
            align-items: center;
            gap: 4px;

            border: 2px solid var(--bg-card);
        }

        .status-dot {
            width: 6px;
            height: 6px;
            background: #34D399;
            border-radius: 50%;

            animation: pulse 2s infinite;
        }

        .name-row {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: .75rem;
            margin-bottom: .5rem;
            flex-wrap: wrap;
        }

        h1 {
            font-size: 1.9rem;
            font-weight: 700;
            letter-spacing: -.02em;
        }

        .name-row a {
            color: var(--text-muted);
            transition: all .2s ease;
        }

        .name-row a:hover {
            color: var(--accent);
            transform: translateY(-2px);
        }

        .name-row i {
            width: 20px;
            height: 20px;
        }

        .title {
            color: var(--accent);

            font-size: .95rem;
            font-weight: 600;

            text-transform: uppercase;
            letter-spacing: .08em;

            margin-bottom: 1.25rem;
        }

        .bio {
            color: var(--text-muted);

            font-size: .95rem;
            line-height: 1.7;

            margin-bottom: 1.75rem;
        }

        .tags {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: .5rem;

            margin-bottom: 2rem;
        }

        .tag {
            background: var(--accent-muted);
            color: var(--accent);

            padding: .4rem .8rem;

            border-radius: 999px;
            font-size: .8rem;
            font-weight: 500;

            border: 1px solid rgba(56,189,248,.12);
        }

        .links-container {
            display: flex;
            flex-direction: column;
            gap: .75rem;
        }

        .btn {
            display: flex;
            justify-content: space-between;
            align-items: center;

            text-decoration: none;
            color: var(--text-main);

            background: var(--accent-muted);

            padding: 1rem 1.25rem;

            border-radius: 14px;
            border: 1px solid var(--border);

            transition: all .2s ease;
        }

        .btn:hover {
            background: var(--accent);
            color: var(--bg-main);
            transform: translateY(-2px);
        }

        .btn-left {
            display: flex;
            align-items: center;
            gap: .75rem;
        }

        .btn i {
            width: 18px;
            height: 18px;
        }

        @keyframes pulse {
            0% {
                transform: scale(.95);
                box-shadow: 0 0 0 0 rgba(52,211,153,.7);
            }

            70% {
                transform: scale(1);
                box-shadow: 0 0 0 6px rgba(52,211,153,0);
            }

            100% {
                transform: scale(.95);
                box-shadow: 0 0 0 0 rgba(52,211,153,0);
            }
        }
    </style>
</head>
<body>

<div class="card">

    <div class="avatar-container">
        <div class="avatar">
            <img src="profile.jpg" alt="Arshia Karkhanehie">
        </div>

        <div class="status-badge">
            <span class="status-dot"></span>
            <span>Building</span>
        </div>
    </div>

    <div class="name-row">
        <h1>Arshia Karkhanehie</h1>

        <a href="https://github.com/ArshiaA99" target="_blank">
            <i data-lucide="github"></i>
        </a>

        <a href="https://www.linkedin.com/in/arshia-karkhanehie-728562249/" target="_blank">
            <i data-lucide="linkedin"></i>
        </a>
    </div>

    <p class="title">Python & AI Engineer</p>

    <p class="bio">
        Specializing in intelligent backend architectures,
        production-grade <strong>RAG pipeline development</strong>,
        and end-to-end <strong>AI automation</strong> workflows.
    </p>

    <div class="tags">
        <span class="tag">Python</span>
        <span class="tag">RAG</span>
        <span class="tag">AI Automation</span>
        <span class="tag">LLMs</span>
        <span class="tag">FastAPI</span>
    </div>

    <div class="links-container">

        <a href="https://github.com/ArshiaA99" target="_blank" class="btn">
            <span class="btn-left">
                <i data-lucide="github"></i>
                GitHub
            </span>
            <i data-lucide="arrow-up-right"></i>
        </a>

        <a href="https://www.linkedin.com/in/arshia-karkhanehie-728562249/" target="_blank" class="btn">
            <span class="btn-left">
                <i data-lucide="linkedin"></i>
                LinkedIn
            </span>
            <i data-lucide="arrow-up-right"></i>
        </a>

        <a href="https://t.me/arshia_itis" target="_blank" class="btn">
            <span class="btn-left">
                <i data-lucide="send"></i>
                Telegram
            </span>
            <i data-lucide="arrow-up-right"></i>
        </a>

        <a href="mailto:arshiak83@gmail.com" class="btn">
            <span class="btn-left">
                <i data-lucide="mail"></i>
                Email Me
            </span>
            <i data-lucide="arrow-up-right"></i>
        </a>

    </div>

</div>

</body>
</html>
