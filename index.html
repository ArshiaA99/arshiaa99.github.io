<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arshia Karkhanehie | Python & AI Engineer</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg-main: #0B0F19;
            --bg-card: #131A26;
            --accent: #38BDF8;
            --accent-muted: #1E293B;
            --text-main: #F8FAFC;
            --text-muted: #94A3B8;
            --border: #1E293B;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 1.5rem;
            overflow-x: hidden;
            position: relative;
            /* Background configuration to pull and blur image */
            background-image: url('https://images.unsplash.com/photo-1517694712202-14dd9538aa97?q=80&w=1600'); /* Example programming image */
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }

        /* The pseudo-element provides the blur effect without blurring the card */
        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: inherit;
            filter: blur(10px) brightness(0.6); /* Adjust blur and brightness here */
            z-index: -2; /* Keeps blur behind everything, including glowing gradients */
        }

        body::after {
            content: '';
            position: absolute;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(56, 189, 248, 0.15) 0%, rgba(0,0,0,0) 70%);
            border-radius: 50%;
            z-index: -1;
            bottom: -50px; right: -50px;
        }

        .card {
            background-color: rgba(19, 26, 38, 0.85); /* Slightly translucent for glass effect */
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 2.5rem;
            width: 100%;
            max-width: 440px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            text-align: center;
            backdrop-filter: blur(5px); /* Subtle internal blur for glassmorphism */
            transition: transform 0.3s ease, border-color 0.3s ease;
        }

        .card:hover {
            transform: translateY(-4px);
            border-color: rgba(56, 189, 248, 0.4);
        }

        .avatar-container {
            position: relative;
            width: 96px;
            height: 96px;
            margin: 0 auto 1.5rem auto;
        }

        .avatar {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: linear-gradient(135deg, #1E293B 0%, #38BDF8 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid var(--border);
            overflow: hidden; /* Ensures image stays circular */
        }

        /* Style for the face image inside the avatar container */
        .avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover; /* Prevents distortion */
        }

        .status-badge {
            position: absolute;
            bottom: 0;
            right: 0;
            background-color: #059669;
            color: #ECFDF5;
            font-size: 0.75rem;
            font-weight: 600;
            padding: 0.25rem 0.6rem;
            border-radius: 12px;
            border: 2px solid var(--bg-card);
            display: flex;
            align-items: center;
            gap: 4px;
            z-index: 1; /* Keeps badge above image */
        }

        .status-dot {
            width: 6px;
            height: 6px;
            background-color: #34D399;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        h1 {
            font-size: 1.75rem;
            font-weight: 700;
            letter-spacing: -0.025em;
            margin-bottom: 0.5rem;
        }

        .title {
            color: var(--accent);
            font-size: 0.95rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 1.25rem;
        }

        .bio {
            color: var(--text-muted);
            font-size: 0.95rem;
            line-height: 1.6;
            margin-bottom: 1.75rem;
        }

        .tags {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 0.5rem;
            margin-bottom: 2rem;
        }

        .tag {
            background-color: var(--accent-muted);
            color: var(--accent);
            font-size: 0.8rem;
            font-weight: 500;
            padding: 0.35rem 0.75rem;
            border-radius: 9999px;
            border: 1px solid rgba(56, 189, 248, 0.1);
        }

        .links-container {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .btn {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background-color: var(--accent-muted);
            color: var(--text-main);
            text-decoration: none;
            padding: 1rem 1.25rem;
            border-radius: 14px;
            font-weight: 500;
            font-size: 0.95rem;
            border: 1px solid var(--border);
            transition: all 0.2s ease;
        }

        .btn:hover {
            background-color: var(--accent);
            color: var(--bg-main);
            border-color: var(--accent);
        }

        .btn-left {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .btn i {
            width: 18px;
            height: 18px;
        }

        @keyframes pulse {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(52, 211, 153, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 6px rgba(52, 211, 153, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(52, 211, 153, 0); }
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="avatar-container">

                <img src="path/to/your/face.jpg" alt="Arshia Karkhanehie" />
            </div>

                <span class="status-dot"></span>

            </div>

        <h1>Arshia Karkhanehie</h1>
        <p class="title">Python & AI Engineer</p>
        
        <p class="bio">
            Specializing in intelligent backend architectures, production-grade <strong>RAG pipeline development</strong>, and end-to-end <strong>AI automation</strong> workflows.
        </p>

        <div class="tags">
            <span class="tag">Python</span>
            <span class="tag">RAG</span>
            <span class="tag">AI Automation</span>
            <span class="tag">LLMs</span>
            <span class="tag">FastAPI</span>
        </div>

        <div class="links-container">
            <a href="https://github.com/ArshiaA99" target="_blank" class="btn">
                <span class="btn-left">
                    <i data-lucide="github"></i>
                    GitHub
                </span>
                <i data-lucide="arrow-up-right"></i>
            </a>
            
            <a href="https://www.linkedin.com/in/arshia-karkhanehie-728562249/" target="_blank" class="btn">
                <span class="btn-left">
                    <i data-lucide="linkedin"></i>
                    LinkedIn
                </span>
                <i data-lucide="arrow-up-right"></i>
            </a>

            <a href="https://t.me/arshia_itis" target="_blank" class="btn">
                <span class="btn-left">
                    <i data-lucide="send"></i>
                    Telegram
                </span>
                <i data-lucide="arrow-up-right"></i>
            </a>

            <a href="mailto:arshiak83@gmail.com" class="btn">
                <span class="btn-left">
                    <i data-lucide="mail"></i>
                    Email Me
                </span>
                <i data-lucide="arrow-up-right"></i>
            </a>
        </div>
    </div>

    <script>

    </script>
</body>
</html>
